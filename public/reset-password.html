<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password - TripInsider</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0F2027, #203A43, #2C5364);
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 32px 28px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
  }
  h1 {
    font-size: 22px;
    margin: 0 0 8px;
    color: #111827;
  }
  p.subtitle {
    color: #6B7280;
    font-size: 14px;
    margin: 0 0 24px;
  }
  label {
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    display: block;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #E5E7EB;
    border-radius: 10px;
    font-size: 15px;
    margin-bottom: 18px;
    box-sizing: border-box;
  }
  input:focus {
    outline: none;
    border-color: #14323A;
  }
  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #F5A623, #FAC55D);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .message {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    display: none;
  }
  .message.success {
    background: #ECFDF5;
    color: #065F46;
    display: block;
  }
  .message.error {
    background: #FEF2F2;
    color: #991B1B;
    display: block;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Reset your password</h1>
    <p class="subtitle">Enter a new password for your TripInsider account.</p>

    <label for="password">New Password</label>
    <input type="password" id="password" placeholder="At least 6 characters" />

    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Re-enter password" />

    <button id="submitBtn" onclick="submitReset()">Reset Password</button>

    <div id="message" class="message"></div>
  </div>

  <script>
    // Extract token from URL path: /reset-password/<token>
    const pathParts = window.location.pathname.split('/');
    const token = pathParts[pathParts.length - 1];

    async function submitReset() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const messageEl = document.getElementById('message');
      const btn = document.getElementById('submitBtn');

      messageEl.className = 'message';
      messageEl.textContent = '';

      if (!password || password.length < 6) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Password must be at least 6 characters.';
        return;
      }
      if (password !== confirmPassword) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Passwords do not match.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const response = await fetch(`/api/auth/reset-password/${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await response.json();

        if (response.ok && data.success) {
          messageEl.className = 'message success';
          messageEl.textContent = 'Password reset successful! You can now log in with your new password in the app.';
          btn.style.display = 'none';
        } else {
          messageEl.className = 'message error';
          messageEl.textContent = data.message || 'This link is invalid or expired.';
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch (err) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Network error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
